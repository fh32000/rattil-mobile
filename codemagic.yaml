workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # ──────────────────────────────────────────────────
      # 1. Auto-increment build number & update app info
      # ──────────────────────────────────────────────────
      - name: Auto-increment version & update release date
        script: |
          #!/bin/bash
          set -e

          # --- Read current version from pubspec.yaml ---
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT_VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$CURRENT_VERSION" | cut -d'+' -f2)

          # --- Increment build number ---
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEW_VERSION="${VERSION_NAME}+${NEW_BUILD_NUMBER}"

          echo "Updating version: $CURRENT_VERSION → $NEW_VERSION"
          sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          # --- Get current date ---
          RELEASE_DATE=$(date +"%d-%m-%Y %I:%M%p")
          FILE_DATE=$(date +"%d-%m-%Y")

          # --- Update app_constants.dart ---
          CONSTANTS_FILE="lib/core/constants/app_constants.dart"
          sed -i '' "s/static const String appVersion = '.*'/static const String appVersion = '$VERSION_NAME'/" "$CONSTANTS_FILE"
          sed -i '' "s/static const String appReleaseDate = '.*'/static const String appReleaseDate = '$RELEASE_DATE'/" "$CONSTANTS_FILE"

          # --- Export for later steps ---
          echo "CM_VERSION=$VERSION_NAME" >> $CM_ENV
          echo "CM_BUILD=$NEW_BUILD_NUMBER" >> $CM_ENV
          echo "CM_DATE=$FILE_DATE" >> $CM_ENV

          echo "✅ Version: $NEW_VERSION"
          echo "✅ Release date: $RELEASE_DATE"

      # ──────────────────────────
      # 2. Install dependencies
      # ──────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ──────────────────────────
      # 3. Build release APK
      # ──────────────────────────
      - name: Build APK
        script: flutter build apk --release

      # ──────────────────────────────────
      # 4. Rename APK with version & date
      # ──────────────────────────────────
      - name: Rename APK
        script: |
          APK_DIR="build/app/outputs/flutter-apk"
          mv "$APK_DIR/app-release.apk" "$APK_DIR/rattil-v${CM_VERSION}-build${CM_BUILD}-${CM_DATE}.apk"
          echo "✅ APK: rattil-v${CM_VERSION}-build${CM_BUILD}-${CM_DATE}.apk"

    artifacts:
      - build/app/outputs/flutter-apk/rattil-*.apk

    publishing:
      email:
        recipients:
          - fh32000@gmail.com
        notify:
          success: true
          failure: true
