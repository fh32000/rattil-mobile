name: rattil
description: "ورتِّله - تطبيق القرآن الكريم"
publish_to: 'none'
version: 1.0.14+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  rxdart: ^0.28.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.6.0
  package_info_plus: ^9.0.0
  quran: ^1.3.3
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
    - assets/audio/juz_amma/
    - assets/audio/juz_amma_ayahs/
    - assets/audio/arabic_alphabet/
    - assets/images/

