publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  rxdart: ^0.28.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive: ^2.2.3
